                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        default: { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Caregiver/provider access token.
    deviceBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Device-scoped short-lived access token.
    deviceBootstrap:
      type: apiKey
      in: header
      name: X-Device-Bootstrap
      description: Installation credential used only before device pairing.

  parameters:
    PatientId:
      name: patientId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string

  responses:
    DataResponse:
      description: Standard Reflexion data envelope.
      content:
        application/json:
          schema:
            type: object
            required: [data, meta]
            properties:
              data:
                description: Route-specific response data.
              meta:
                $ref: "#/components/schemas/ResponseMeta"
    Error:
      description: Structured API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    AuthSessionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [accessToken, accessTokenExpiresAt, refreshToken, refreshTokenExpiresAt]
          properties:
            accessToken: { type: string, writeOnly: true }
            accessTokenExpiresAt: { type: string, format: date-time }
            refreshToken: { type: string, writeOnly: true }
            refreshTokenExpiresAt: { type: string, format: date-time }
            actor: { type: object, additionalProperties: true }
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ResponseMeta:
      type: object
      required: [requestId]
      properties:
        requestId:
          type: string
    PageMeta:
      allOf:
        - $ref: "#/components/schemas/ResponseMeta"
        - type: object
          properties:
            nextCursor:
              type: [string, "null"]
    ErrorResponse:
      type: object
      required: [error, meta]
      properties:
        error:
          type: object
          required: [code, message, retryable]
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
            details:
              type: array
              items:
                type: object
                additionalProperties: true
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ActorResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [userId, tenantId, roles]
          properties:
            userId:
              type: string
            tenantId:
              type: string
            name:
              type: string
            email:
              type: string
              format: email
            roles:
              type: array
              items:
                type: string
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    Patient:
      type: object
      required: [patientId, displayName, preferredLanguage, timezone, status, version]
      properties:
        patientId:
          type: string
        displayName:
          type: string
        preferredLanguage:
          type: string
        timezone:
          type: string
        ageBand:
          type: [string, "null"]
        status:
          type: string
          enum: [active, inactive, archived]
        version:
          type: integer
    CreatePatientRequest:
      type: object
      required: [displayName, preferredLanguage, timezone]
      properties:
        displayName:
          type: string
          maxLength: 120
        preferredLanguage:
          type: string
        timezone:
          type: string
        ageBand:
          type: string
        relationshipType:
          type: string
    UpdatePatientRequest:
      type: object
      minProperties: 1
      properties:
        displayName:
          type: string
        preferredLanguage:
          type: string
        timezone:
          type: string
        status:
          type: string
          enum: [active, inactive]
    CreatePairingRequest:
      type: object
      required: [hardwareRevision, softwareVersion, timezone]
      properties:
        hardwareRevision:
          type: string
        softwareVersion:
          type: string
        timezone:
          type: string
        deviceNonce:
          type: string
    PairingSession:
      type: object
      required: [pairingId, displayCode, state, expiresAt]
      properties:
        pairingId:
          type: string
        displayCode:
          type: string
          pattern: "^[0-9]{6}$"
        state:
          type: string
          enum: [pending]
        expiresAt:
          type: string
          format: date-time
        pollAfterSeconds:
          type: integer
          minimum: 1
    PairingStatus:
      type: object
      required: [pairingId, state, expiresAt]
      properties:
        pairingId:
          type: string
        state:
          type: string
          enum: [pending, paired, expired, cancelled]
        expiresAt:
          type: string
          format: date-time
        patientDisplayName:
          type: string
        exchangeTicket:
          type: string
          writeOnly: true
        exchangeTicketExpiresAt:
          type: string
          format: date-time
    DeviceAssignment:
      type: object
      required: [assignmentId, deviceId, patientId, status, assignedAt]
      properties:
        assignmentId:
          type: string
        deviceId:
          type: string
        patientId:
          type: string
        mirrorName:
          type: string
        status:
          type: string
          enum: [active, revoked, replaced]
        assignedAt:
          type: string
          format: date-time
    DeviceCredential:
      type: object
      required: [accessToken, accessTokenExpiresAt, refreshCredential]
      properties:
        accessToken:
          type: string
          writeOnly: true
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshCredential:
          type: string
          writeOnly: true
    DeviceHeartbeat:
      type: object
      required:
        - heartbeatId
        - recordedAt
        - appVersion
        - networkStatus
        - micStatus
        - backendReachable
      properties:
        heartbeatId:
          type: string
        recordedAt:
          type: string
          format: date-time
        appVersion:
          type: string
        networkStatus:
          type: string
          enum: [online, degraded, offline]
        micStatus:
          type: string
          enum: [ok, unavailable, permission_denied, error]
        speakerStatus:
          type: string
          enum: [ok, unavailable, error]
        backendReachable:
          type: boolean
        diagnostics:
          type: object
          additionalProperties: true
    CreateSessionRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [companion, daily_checkin, clinic_assessment, device_test]
        patientId:
          type: string
          description: Required for human actors; resolved from assignment for a device.
        clientSessionId:
          type: string
        requestedLanguage:
          type: string
        clientContext:
          type: object
          additionalProperties: true
    Session:
      type: object
      required: [sessionId, patientId, type, state, stateVersion, protocolContext, createdAt]
      properties:
        sessionId:
          type: string
        patientId:
          type: string
        deviceId:
          type: [string, "null"]
        type:
          type: string
          enum: [companion, daily_checkin, clinic_assessment, device_test]
        state:
          type: string
          enum:
            - created
            - active
            - local_complete
            - ingesting
            - processing
            - ingested
            - qc_pending
            - feature_pending
            - scored
            - review_pending
            - completed
            - excluded
            - failed
            - processing_failed
        stateVersion:
          type: integer
        protocolContext:
          type: object
          required: [protocolVersion, promptVersion, featureSchemaVersion]
          properties:
            protocolVersion:
              type: string
            promptVersion:
              type: string
            toolPolicyVersion:
              type: string
            featureSchemaVersion:
              type: string
        createdAt:
          type: string
          format: date-time
        operationId:
          type: string
    RealtimeTicket:
      type: object
      required: [provider, endpoint, ticket, expiresAt, sessionPolicy]
      properties:
        provider:
          type: string
          enum: [qwen]
        endpoint:
          type: string
          format: uri
        ticket:
          type: string
          writeOnly: true
        expiresAt:
          type: string
          format: date-time
        sessionPolicy:
          type: object
          additionalProperties: true
    SessionEvent:
      type: object
      required: [eventId, sequence, occurredAt, kind, payload]
      properties:
        eventId:
          type: string
        sequence:
          type: integer
          minimum: 0
        occurredAt:
          type: string
          format: date-time
        kind:
          type: string
          enum:
            - transcript_turn
            - tool_call
            - tool_result
            - capture_metric
            - lifecycle
            - user_correction
        payload:
          type: object
          additionalProperties: true
    ArtifactIntent:
      type: object
      required: [clientArtifactId, kind, contentType, sizeBytes, hash]
      properties:
        clientArtifactId:
          type: string
        kind:
          type: string
          enum: [audio, video, transcript, image, sidecar]
        contentType:
          type: string
        sizeBytes:
          type: integer
          minimum: 1
        hash:
          type: string
    PreparedArtifactUpload:
      type: object
      required: [artifactId]
      properties:
        artifactId:
          type: string
        uploadUrl:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        requiredHeaders:
          type: object
          additionalProperties:
            type: string
        alreadyUploaded:
          type: boolean
          description: True when this clientArtifactId was already committed and no PUT or commit is required.
    SessionProcessingStatus:
      type: object
      required: [sessionId, state, stage, retryable, updatedAt]
      properties:
        sessionId: { type: string }
        operationId: { type: [string, "null"] }
        state:
          type: string
          enum: [accepted, queued, processing, completed, failed]
        stage: { type: string }
        retryable: { type: boolean }
        result:
          type: [object, "null"]
          additionalProperties: true
        updatedAt: { type: string, format: date-time }
    Notification:
      type: object
      required: [notificationId, patientId, type, state, title, body, source, createdAt]
      properties:
        notificationId: { type: string }
        patientId: { type: string }
        type: { type: string, enum: [worth_checking, needs_attention] }
        state: { type: string, enum: [unread, read] }
        title: { type: string }
        body: { type: string }
        source:
          type: object
          required: [type, id]
          properties:
            type: { type: string, enum: [review_case] }
            id: { type: string }
        createdAt: { type: string, format: date-time }
        readAt: { type: [string, "null"], format: date-time }
    CompleteSessionRequest:
      type: object
      required: [localCompletedAt, finalSequence, artifactIds]
      properties:
        localCompletedAt:
          type: string
          format: date-time
        finalSequence:
          type: integer
          minimum: 0
        artifactIds:
          type: array
          items:
            type: string
        acquisitionSummary:
          type: object
          properties:
            durationMs:
              type: integer
              minimum: 0
            patientSpeechMs:
              type: integer
              minimum: 0
            patientTurns:
              type: integer
              minimum: 0
    OperationResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [operationId, state]
          properties:
            operationId:
              type: string
            state:
              type: string
              enum: [accepted, queued, processing, completed, failed]
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    MedicationPlan:
      type: object
      required: [planId, patientId, displayName, schedule, status, version]
      properties:
        planId:
          type: string
        patientId:
          type: string
        displayName:
          type: string
        instructions:
          type: string
        schedule:
          type: object
          required: [timezone, times]
          properties:
            timezone:
              type: string
            times:
              type: array
              items:
                type: string
                pattern: "^[0-2][0-9]:[0-5][0-9]$"
            recurrence:
              type: string
        source:
          type: string
          enum: [caregiver, provider]
        status:
          type: string
          enum: [active, paused, ended]
        version:
          type: integer
    CreateMedicationPlanRequest:
      type: object
      required: [displayName, schedule, source]
      properties:
        displayName:
          type: string
          maxLength: 160
        instructions:
          type: string
          maxLength: 1000
        schedule:
          type: object
          required: [timezone, times]
          properties:
            timezone:
              type: string
            times:
              type: array
              minItems: 1
              items:
                type: string
                pattern: "^[0-2][0-9]:[0-5][0-9]$"
            recurrence:
              type: string
        source:
          type: string
          enum: [caregiver, provider]
    ReminderOccurrence:
      type: object
      required: [occurrenceId, patientId, scheduledAt, type, status]
      properties:
        occurrenceId:
          type: string
        patientId:
          type: string
        scheduledAt:
          type: string
          format: date-time
        type:
          type: string
          enum: [medication, appointment, activity, custom]
        displayText:
          type: string
        status:
          type: string
          enum: [scheduled, delivered, taken, skipped, snoozed, missed, cancelled, unknown]
        respondedAt:
          type: [string, "null"]
          format: date-time
    CaregiverStatus:
      type: object
      required:
        - patientId
        - baselineState
        - status
        - primaryReason
        - lastInteractionAt
        - updatedAt
      properties:
        patientId:
          type: string
        baselineState:
          type: string
          enum: [establishing, complete, stale]
        baselineProgress:
          type: object
          properties:
            completedSessions:
              type: integer
              minimum: 0
            requiredSessions:
              type: integer
              const: 7
            windowDays:
              type: integer
              const: 14
        status:
          type: [string, "null"]
          enum: [establishing, doing_well, worth_checking, needs_attention, null]
        primaryReason:
          type: [string, "null"]
        secondaryReasons:
          type: array
          items:
            type: string
        completedToday:
          type: boolean
        technicalState:
          type: string
          enum: [ok, possible_issue, unreachable, unknown]
        lastInteractionAt:
          type: [string, "null"]
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateAwayPeriodRequest:
      type: object
      required: [startsOn, endsOn, timezone]
      properties:
        startsOn:
          type: string
          format: date
        endsOn:
          type: string
          format: date
        timezone:
          type: string
        reason:
          type: string
          maxLength: 500
    AwayPeriod:
      type: object
      required: [awayPeriodId, patientId, startsOn, endsOn, timezone, state]
      properties:
        awayPeriodId:
          type: string
        patientId:
          type: string
        startsOn:
          type: string
          format: date
        endsOn:
          type: string
          format: date
        timezone:
          type: string
        state:
          type: string
          enum: [active, cancelled, completed]
    CreateManualFlagRequest:
      type: object
      required: [severity, reason]
      properties:
        severity:
          type: string
          enum: [worth_checking, needs_attention]
        reason:
          type: string
          maxLength: 1000
    ManualFlag:
      type: object
      required: [manualFlagId, patientId, severity, reason, state, createdAt]
      properties:
        manualFlagId:
          type: string
        patientId:
          type: string
        severity:
          type: string
          enum: [worth_checking, needs_attention]
        reason:
          type: string
        state:
          type: string
          enum: [active, resolved, dismissed]
        createdAt:
          type: string
          format: date-time
    MonitoringSummary:
      type: object
      required: [patientId, baselineState, displayState, coverage, updatedAt]
      properties:
        patientId:
          type: string
        baselineState:
          type: string
          enum: [not_started, building, complete, stale]
        displayState:
          type: string
          enum: [building, on_track, repeat_needed, review_pending]
        coverage:
          type: object
          required: [usableSessions, requiredSessions, distinctWeeks, spanDays]
          properties:
            usableSessions:
              type: integer
            requiredSessions:
              type: integer
            distinctWeeks:
              type: integer
            spanDays:
              type: integer
            qualityCoverage:
              type: number
              minimum: 0
              maximum: 1
        providerDetail:
          type: object
          description: Present only for provider/reviewer scopes.
          additionalProperties: true
        updatedAt:
          type: string
          format: date-time
    MonitoringPoint:
      type: object
      required: [recordedAt, inclusion, displayState]
      properties:
        sessionId:
          type: string
        recordedAt:
          type: string
          format: date-time
        inclusion:
          type: string
          enum: [include, include_with_caveats, repeat_requested, manual_review, exclude]
        displayState:
          type: string
          enum: [building, on_track, repeat_needed, review_pending]
        providerDetail:
          type: object
          additionalProperties: true
    ReviewCase:
      type: object
      required: [caseId, patientId, reason, priority, state, createdAt]
      properties:
        caseId:
          type: string
        patientId:
          type: string
        reason:
          type: string
        priority:
          type: string
          enum: [routine, elevated, urgent]
        state:
          type: string
          enum: [open, assigned, awaiting_follow_up, closed]
        sourceRefs:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    CreateDispositionRequest:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum:
            - confirmed_meaningful_change
            - no_meaningful_change
            - acute_or_reversible_context
            - poor_quality
            - wrong_identity
            - protocol_issue
            - follow_up_ordered
            - insufficient_information
        notes:
          type: string
          maxLength: 5000
        closeCase:
          type: boolean
          default: false
    ReviewDisposition:
      type: object
      required: [dispositionId, caseId, reviewerId, outcome, createdAt]
      properties:
        dispositionId:
          type: string
        caseId:
          type: string
        reviewerId:
          type: string
        outcome:
          type: string
        createdAt:
          type: string
          format: date-time
