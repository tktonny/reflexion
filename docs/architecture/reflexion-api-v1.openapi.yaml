openapi: 3.1.0
info:
  title: Reflexion Platform API
  version: 1.0.0
  description: >-
    Implemented unified contract for Mirror, Caregiver, Provider, device pairing,
    session ingestion, care plans, longitudinal monitoring, and review workflows.
    Long-running media and ML processing is asynchronous.
servers:
  - url: https://api.example.com
    description: Self-hosted production API origin
  - url: http://localhost:3001
    description: Local development
tags:
  - name: Identity
  - name: Patients
  - name: Devices
  - name: Sessions
  - name: CarePlan
  - name: Monitoring
  - name: Review
  - name: Notifications
  - name: Tools

paths:
  /health:
    get:
      summary: Health Check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is accepting requests.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /api/v1/auth/sessions:
    post:
      tags: [Identity]
      summary: Create Auth Session
      operationId: createAuthSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, writeOnly: true }
      responses:
        "201":
          description: Human access and rotating refresh credentials.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSessionResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/session-refreshes:
    post:
      tags: [Identity]
      summary: Refresh Auth Session
      operationId: refreshAuthSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string, writeOnly: true }
      responses:
        "201":
          description: Rotated human credentials.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSessionResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/password-reset-requests:
    post:
      tags: [Identity]
      summary: Request Password Reset
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "202": { description: Accepted without disclosing account existence. }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/password-resets:
    post:
      tags: [Identity]
      summary: Reset Password
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: { type: string, writeOnly: true }
                newPassword: { type: string, minLength: 12, writeOnly: true }
      responses:
        "200": { description: Password changed and prior sessions revoked. }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/sessions/current:
    delete:
      tags: [Identity]
      summary: Delete Current Auth Session
      operationId: deleteCurrentAuthSession
      security:
        - bearerAuth: []
      responses:
        "204": { description: Current login session revoked. }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/me:
    get:
      tags: [Identity]
      summary: Get Current Actor
      operationId: getCurrentActor
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActorResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/patients:
    get:
      tags: [Patients]
      summary: List Authorized Patients
      operationId: listAuthorizedPatients
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Patients visible through active relationships and scopes.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Patient"
                  meta:
                    $ref: "#/components/schemas/PageMeta"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Patients]
      summary: Create Patient
      operationId: createPatient
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created and current actor relationship established.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/Patient"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/patients/{patientId}:
    parameters:
      - $ref: "#/components/parameters/PatientId"
    get:
      tags: [Patients]
      summary: Get Patient
      operationId: getPatient
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authorized patient profile.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/Patient"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Patients]
      summary: Update Patient
      operationId: updatePatient
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/UpdatePatientRequest"
      responses:
        "200":
          description: Updated patient.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/Patient"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/patients/{patientId}/care-relationships:
    get:
      tags: [Patients]
      summary: List Care Relationships
      operationId: listCareRelationships
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientId"
      responses:
        "200": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/patients/{patientId}/consents:
    post:
      tags: [Patients]
      summary: Record Patient Consent
      operationId: recordPatientConsent
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [purpose, documentVersion, status]
              properties:
                purpose: { type: string }
                documentVersion: { type: string }
                status: { type: string, enum: [granted, withdrawn] }
      responses:
        "201": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/patients/{patientId}/program-enrollments/current:
    get:
      tags: [Patients]
      summary: Get Current Program Enrollment
      operationId: getCurrentProgramEnrollment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PatientId"
      responses:
        "200": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/device-pairings:
    post:
      tags: [Devices]
      summary: Create Device Pairing
      operationId: createDevicePairing
      description: Create a short-lived pairing code from an installed device.
      security:
        - deviceBootstrap: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePairingRequest"
      responses:
        "201":
          description: Pairing session created.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/PairingSession"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/device-pairings/{pairingId}:
    get:
      tags: [Devices]
      summary: Get Device Pairing
      operationId: getDevicePairing
      security:
        - deviceBootstrap: []
      parameters:
        - name: pairingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pairing status. A paired response may include a one-time exchange ticket.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/PairingStatus"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/device-pairing-claims:
    post:
      tags: [Devices]
      summary: Claim Device Pairing
      operationId: claimDevicePairing
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pairingCode, patientId]
              properties:
                pairingCode:
                  type: string
                  pattern: "^[0-9]{6}$"
                patientId:
                  type: string
                mirrorName:
                  type: string
                  maxLength: 80
      responses:
        "200":
          description: Pairing claimed and active assignment created atomically.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/DeviceAssignment"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/device-credentials/exchange:
    post:
      tags: [Devices]
      summary: Exchange Device Credential
      operationId: exchangeDeviceCredential
      security:
        - deviceBootstrap: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pairingId, exchangeTicket]
              properties:
                pairingId:
                  type: string
                exchangeTicket:
                  type: string
                  writeOnly: true
      responses:
        "200":
          description: Short-lived device access token and rotating refresh credential.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/DeviceCredential"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/devices/{deviceId}:
    get:
      tags: [Devices]
      summary: Get Device
      operationId: getDevice
      security:
        - bearerAuth: []
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      responses:
        "200": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/devices/{deviceId}/credential-rotations:
    post:
      tags: [Devices]
      summary: Rotate Device Credential
      operationId: rotateDeviceCredential
      security: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credentialId, refreshCredential]
              properties:
                credentialId: { type: string }
                refreshCredential: { type: string, writeOnly: true }
      responses:
        "201": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/devices/{deviceId}/revocations:
    post:
      tags: [Devices]
      summary: Revoke Device
      operationId: revokeDevice
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        "202": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/devices/{deviceId}/configuration:
    get:
      tags: [Devices]
      summary: Get Device Configuration
      operationId: getDeviceConfiguration
      security:
        - bearerAuth: []
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      responses:
        "200": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/devices/{deviceId}/heartbeats:
    post:
      tags: [Devices]
      summary: Record Device Heartbeat
      operationId: recordDeviceHeartbeat
      description: >-
        Records raw device reachability and component health. The device does not
        interpret the heartbeat or compute caregiver status.
      security:
        - deviceBearer: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceHeartbeat"
      responses:
        "202":
          description: Heartbeat accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/sessions:
    post:
      tags: [Sessions]
      summary: Create Session
      operationId: createSession
      security:
        - deviceBearer: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created with frozen protocol and consent context.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/Session"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Get Session
      operationId: getSession
      security:
        - deviceBearer: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session status and safe processing summary.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/Session"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/sessions/{sessionId}/processing-status:
    get:
      tags: [Sessions]
      summary: Get Session Processing Status
      operationId: getSessionProcessingStatus
      description: Stable polling contract for asynchronous artifact verification and session processing.
      security:
        - deviceBearer: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Current asynchronous processing stage and safe result summary.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/SessionProcessingStatus"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/sessions/{sessionId}/realtime-tickets:
    post:
      tags: [Sessions]
      summary: Create Realtime Ticket
      operationId: createRealtimeTicket
      description: Ticket is short-lived and scoped to one session and provider policy.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "201":
          description: Realtime connection parameters.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    $ref: "#/components/schemas/RealtimeTicket"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/sessions/{sessionId}/event-batches:
    post:
      tags: [Sessions]
      summary: Append Session Events
      operationId: appendSessionEvents
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    $ref: "#/components/schemas/SessionEvent"
      responses:
        "202":
          description: Events accepted idempotently.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [accepted, duplicates]
                    properties:
                      accepted:
                        type: integer
                      duplicates:
                        type: integer
                      nextExpectedSequence:
                        type: integer
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/sessions/{sessionId}/artifact-upload-plans:
    post:
      tags: [Sessions]
      summary: Prepare Artifact Upload
      operationId: prepareArtifactUpload
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artifacts]
              properties:
                artifacts:
                  type: array
                  minItems: 1
                  maxItems: 20
                  items:
                    $ref: "#/components/schemas/ArtifactIntent"
      responses:
        "200":
          description: Pre-signed upload parts. Media bytes do not pass through this API.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PreparedArtifactUpload"
                  meta:
                    $ref: "#/components/schemas/ResponseMeta"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/sessions/{sessionId}/artifacts/commit:
    post:
      tags: [Sessions]
      summary: Commit Artifact Uploads
      operationId: commitArtifactUploads
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artifacts]
              properties:
                artifacts:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [artifactId, hash, sizeBytes]
                    properties:
                      artifactId:
                        type: string
                      hash:
                        type: string
                      sizeBytes:
                        type: integer
                        minimum: 1
      responses:
        "202":
          description: Artifact verification queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/sessions/{sessionId}/complete:
    post:
      tags: [Sessions]
      summary: Complete Session
      operationId: completeSession
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSessionRequest"
      responses:
        "202":
          description: Session accepted for asynchronous ingestion and analysis.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/sessions/{sessionId}/upload-retries:
    post:
      tags: [Sessions]
      summary: Retry Artifact Uploads
      operationId: retryArtifactUploads
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artifactIds]
              properties:
                artifactIds: { type: array, maxItems: 20, items: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/sessions/{sessionId}/abandon:
    post:
      tags: [Sessions]
      summary: Abandon Session
      operationId: abandonSession
      security:
        - deviceBearer: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, enum: [client_restart, user_cancelled, transport_failed, superseded] }
      responses:
        "200": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/sessions/{sessionId}/tool-invocations:
    post:
      tags: [Tools]
      summary: Invoke Session Tool
      operationId: invokeSessionTool
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tool, arguments]
              properties:
                tool: { type: string, enum: [weather.get, web.search, medication.list, reminders.upcoming] }
                arguments: { type: object, additionalProperties: true }
      responses:
        "200": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/patients/{patientId}/care-plan:
    parameters:
      - $ref: "#/components/parameters/PatientId"
    get:
      tags: [CarePlan]
      summary: Get Care Plan
      operationId: getCarePlan
      security:
        - bearerAuth: []
        - deviceBearer: []
      responses:
        "200": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }
    put:
      tags: [CarePlan]
      summary: Replace Care Plan
      operationId: replaceCarePlan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200": { $ref: "#/components/responses/DataResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/patients/{patientId}/medication-plans:
    parameters:
      - $ref: "#/components/parameters/PatientId"
    get:
      tags: [CarePlan]
      summary: List Medication Plans
      operationId: listMedicationPlans
      security:
        - bearerAuth: []
        - deviceBearer: []
      responses:
        "200":
          description: Active medication plans visible to the actor.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MedicationPlan"
                  meta:
